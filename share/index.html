<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared with you</title>
  <meta property="og:title" content="Shared with you">
  <meta property="og:description" content="Someone sent you something">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#121010">
  <link rel="canonical" href="https://lmpt.io/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-header-avatar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/>
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          </svg>
        </div>
        <div class="chat-header-info">
          <span class="chat-header-title">AI Assistant</span>
          <span class="chat-header-status" id="header-status">Online</span>
        </div>
      </div>
      <div class="chat-header-dots">
        <div class="chat-header-dot"></div>
        <div class="chat-header-dot"></div>
        <div class="chat-header-dot"></div>
      </div>
    </div>

    <div class="chat-body" id="chat-body">
      <!-- User message bubble — typewriter types into here -->
      <div class="message message-user hidden" id="user-message">
        <div class="message-bubble message-bubble-user">
          <span id="typed-text"></span><span id="cursor" class="cursor"></span>
        </div>
      </div>

      <!-- Input area shown initially, fades out after "send" -->
      <div class="input-bar" id="input-bar">
        <div class="input-bar-text">
          <span id="input-preview"></span><span id="input-cursor" class="cursor"></span>
        </div>
        <button class="send-btn" id="send-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

      <!-- AI response bubble — thinking dots, then snarky message -->
      <div class="message message-ai hidden" id="ai-message">
        <div class="message-avatar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="9" x2="9.01" y2="9"/>
            <line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
        </div>
        <div class="message-bubble message-bubble-ai">
          <div id="thinking-dots" class="thinking-dots"><span></span><span></span><span></span></div>
          <div id="snarky-message" class="snarky-message hidden">
            <p class="snarky-title" id="snarky-title"></p>
            <p class="snarky-subtitle" id="snarky-subtitle"></p>
          </div>
        </div>
      </div>

      <div id="redirect-notice" class="redirect-notice hidden">
        <span id="redirect-text"></span>
        <button id="cancel-redirect" class="cancel-link">Cancel</button>
      </div>

      <div id="ai-buttons" class="ai-buttons hidden">
        <a id="btn-perplexity" class="ai-btn ai-btn-perplexity" target="_blank" rel="noopener">Ask Perplexity</a>
        <a id="btn-chatgpt" class="ai-btn ai-btn-chatgpt" target="_blank" rel="noopener">Ask ChatGPT</a>
        <button id="btn-claude" class="ai-btn ai-btn-claude">Ask Claude</button>
        <button id="btn-copy" class="ai-btn ai-btn-copy">Copy Question</button>
      </div>

      <div id="toast" class="toast hidden"></div>
    </div>
  </div>

  <script src="./shared/cipher.js"></script>
  <script src="animation.js"></script>
  <!-- Cloudflare Web Analytics — replace TOKEN with your site token from the CF dashboard -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "CLOUDFLARE_ANALYTICS_TOKEN_SHARE"}'></script>
</body>
</html>
