<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared with you</title>
  <meta property="og:title" content="Shared with you">
  <meta property="og:description" content="Someone sent you something">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="chat-header-dot"></div>
      <div class="chat-header-dot"></div>
      <div class="chat-header-dot"></div>
      <span class="chat-header-title">AI Assistant</span>
    </div>

    <div class="chat-body">
      <div class="prompt-area">
        <div class="prompt-input" id="prompt-input">
          <span id="typed-text"></span><span id="cursor" class="cursor"></span>
        </div>
        <button class="send-btn" id="send-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

      <div id="snarky-message" class="snarky-message hidden">
        <p class="snarky-title">Was that so hard?</p>
        <p class="snarky-subtitle">Next time, just prompt it yourself.</p>
      </div>

      <div id="redirect-notice" class="redirect-notice hidden">
        <span id="redirect-text"></span>
        <button id="cancel-redirect" class="cancel-link">Cancel</button>
      </div>

      <div id="ai-buttons" class="ai-buttons hidden">
        <a id="btn-perplexity" class="ai-btn ai-btn-perplexity" target="_blank" rel="noopener">Ask Perplexity</a>
        <a id="btn-chatgpt" class="ai-btn ai-btn-chatgpt" target="_blank" rel="noopener">Ask ChatGPT</a>
        <button id="btn-claude" class="ai-btn ai-btn-claude">Ask Claude</button>
        <button id="btn-copy" class="ai-btn ai-btn-copy">Copy Question</button>
      </div>

      <div id="toast" class="toast hidden"></div>
    </div>
  </div>

  <script src="/shared/cipher.js"></script>
  <script src="/animation.js"></script>
</body>
</html>
