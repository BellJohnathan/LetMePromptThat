<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Let Me Prompt That</title>
  <meta name="description" content="When a colleague asks you something they could've just asked AI. Send them this link instead.">
  <meta property="og:title" content="Let Me Prompt That">
  <meta property="og:description" content="When a colleague asks you something they could've just asked AI.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Let Me Prompt That</h1>
      <p class="subtitle">Colleague asked you something they could've just asked AI?<br>Send them this link instead.</p>
    </header>

    <main>
      <div class="input-group">
        <label for="question">What did they ask you?</label>
        <textarea id="question" placeholder="how to center a div in CSS" rows="3" autofocus></textarea>
      </div>

      <div class="ai-options">
        <label class="ai-options-label">Redirect them to:</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="ai" value="p" checked>
            <svg class="radio-logo" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M5.08512 1L11.3706 6.77187V6.77054V1.01332H12.5942V6.7977L18.9078 1V7.58078H21.5V17.0729H18.9158V22.9328L12.5942 17.3973V22.9964H11.3706V17.4886L5.09224 23V17.0729H2.5V7.58078H5.08512V1ZM10.4482 8.78535H3.72354V15.8684H5.09071V13.6341L10.4482 8.78535ZM6.31572 14.1686V20.3121L11.3706 15.8747V9.5926L6.31572 14.1686ZM12.6294 15.816V9.58668L17.6857 14.163V17.0729H17.6922V20.2494L12.6294 15.816ZM18.9158 15.8684H20.2765V8.78535H13.6019L18.9158 13.5839V15.8684ZM17.6843 7.58078V3.77077L13.5352 7.58078H17.6843ZM10.4577 7.58078H6.30866V3.77077L10.4577 7.58078Z" fill="currentColor"/>
            </svg>
            <span class="radio-name">Perplexity</span>
            <span class="tooltip-wrap">
              <svg class="info-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="8" cy="8" r="7"/><path d="M8 7v4" stroke-linecap="round"/><circle cx="8" cy="5" r="0.5" fill="currentColor" stroke="none"/>
              </svg>
              <span class="tooltip">Searches the web and answers automatically</span>
            </span>
          </label>
          <label class="radio-option">
            <input type="radio" name="ai" value="g">
            <svg class="radio-logo" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9.438 9.00799V6.91798C9.438 6.74195 9.50345 6.60988 9.65602 6.52198L13.8206 4.10199C14.3876 3.77203 15.0635 3.61809 15.7611 3.61809C18.3775 3.61809 20.0347 5.66414 20.0347 7.84206C20.0347 7.996 20.0347 8.17203 20.0128 8.34806L15.6956 5.79601C15.434 5.64206 15.1723 5.64206 14.9107 5.79601L9.438 9.00799ZM19.1624 17.148V12.1539C19.1624 11.8458 19.0316 11.6259 18.77 11.4719L13.2973 8.25993L15.0851 7.22587C15.2378 7.13796 15.3687 7.13796 15.5212 7.22587L19.6858 9.64584C20.8851 10.3499 21.6917 11.8458 21.6917 13.2978C21.6917 14.9697 20.7106 16.5099 19.1624 17.148ZM8.15159 12.7481L6.36369 11.6921C6.21112 11.6042 6.14567 11.4722 6.14567 11.2961V6.45615C6.14567 4.10221 7.93357 2.32009 10.3539 2.32009C11.2697 2.32009 12.1198 2.62818 12.8396 3.17813L8.54426 5.68623C8.28269 5.84017 8.15179 6.06014 8.15179 6.36825L8.15159 12.7481ZM12 14.992L9.438 13.5401V10.4601L12 9.0082L14.5618 10.4601V13.5401L12 14.992ZM13.6462 21.6801C12.7303 21.6801 11.8802 21.372 11.1604 20.8221L15.4557 18.314C15.7174 18.1601 15.8482 17.94 15.8482 17.6319V11.2519L17.6579 12.3079C17.8106 12.3958 17.876 12.5279 17.876 12.7039V17.5439C17.876 19.8978 16.0662 21.6801 13.6462 21.6801ZM8.47861 16.7742L4.31401 14.3541C3.11471 13.6501 2.30809 12.1542 2.30809 10.7022C2.30809 9.0082 3.31105 7.49022 4.85905 6.85215V11.8681C4.85905 12.1762 4.98994 12.3962 5.25152 12.5501L10.7026 15.74L8.91464 16.7742C8.76207 16.862 8.63118 16.862 8.47861 16.7742ZM8.23892 20.3821C5.77509 20.3821 3.96531 18.5121 3.96531 16.2021C3.96531 16.0261 3.98719 15.8501 4.00887 15.6741L8.30416 18.1821C8.56573 18.3361 8.82752 18.3361 9.08909 18.1821L14.5618 14.9922V17.0823C14.5618 17.2583 14.4964 17.3904 14.3437 17.4782L10.1791 19.8982C9.61225 20.2282 8.93653 20.3821 8.23892 20.3821ZM13.6462 23C16.2844 23 18.4865 21.1081 18.9882 18.6C21.4301 17.962 23 15.652 23 13.298C23 11.758 22.346 10.2621 21.1685 9.18401C21.2776 8.72197 21.343 8.25993 21.343 7.79811C21.343 4.65216 18.8137 2.298 15.892 2.298C15.3034 2.298 14.7364 2.38591 14.1696 2.58401C13.1883 1.61598 11.8364 1 10.3539 1C7.71555 1 5.51351 2.8919 5.01182 5.4C2.56988 6.03807 1 8.34806 1 10.702C1 12.2421 1.65405 13.7379 2.83145 14.816C2.72245 15.278 2.657 15.74 2.657 16.2019C2.657 19.3479 5.18628 21.702 8.10803 21.702C8.69663 21.702 9.26355 21.6141 9.83047 21.416C10.8115 22.384 12.1634 23 13.6462 23Z" fill="currentColor"/>
            </svg>
            <span class="radio-name">ChatGPT</span>
            <span class="tooltip-wrap">
              <svg class="info-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="8" cy="8" r="7"/><path d="M8 7v4" stroke-linecap="round"/><circle cx="8" cy="5" r="0.5" fill="currentColor" stroke="none"/>
              </svg>
              <span class="tooltip">Pre-fills your question in the chat</span>
            </span>
          </label>
          <label class="radio-option">
            <input type="radio" name="ai" value="c">
            <svg class="radio-logo" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5.31646 15.6259L9.64405 13.1993L9.71646 12.9879L9.64405 12.871H9.43241L8.70835 12.8265L6.23544 12.7597L4.09114 12.6706L2.01367 12.5593L1.49013 12.448L1 11.8024L1.05013 11.4796L1.49013 11.1847L2.11949 11.2403L3.5119 11.3349L5.60051 11.4796L7.11544 11.5687L9.36 11.8024H9.71646L9.76658 11.6577L9.64405 11.5687L9.54937 11.4796L7.38835 10.0159L5.04911 8.46876L3.8238 7.5783L3.16101 7.1275L2.82684 6.70453L2.68203 5.78067L3.28354 5.11839L4.09114 5.17405L4.29722 5.2297L5.11595 5.85859L6.86481 7.21098L9.14835 8.89173L9.48253 9.17L9.6162 9.07539L9.63291 9.0086L9.48253 8.75816L8.24051 6.5153L6.91494 4.23349L6.32456 3.28738L6.16861 2.71971C6.11291 2.48596 6.07392 2.29117 6.07392 2.05186L6.75899 1.12244L7.13772 1L8.05114 1.12244L8.43544 1.45636L9.00354 2.7531L9.92253 4.7956L11.3484 7.57273L11.7661 8.39641L11.9889 9.15887L12.0724 9.39261H12.2172V9.25904L12.3342 7.69517L12.5514 5.77511L12.763 3.30407L12.8354 2.6084L13.1808 1.77359L13.8658 1.32279L14.4005 1.5788L14.8405 2.20769L14.7792 2.61396L14.5175 4.31141L14.0051 6.97167L13.6709 8.75259H13.8658L14.0886 8.52998L14.9909 7.33342L16.5058 5.44118L17.1742 4.68986L17.9539 3.86061L18.4552 3.46547H19.402L20.0982 4.50063L19.7863 5.56919L18.8116 6.80471L18.0041 7.851L16.8456 9.40931L16.1215 10.656L16.1884 10.7561L16.361 10.7394L18.9787 10.1829L20.3934 9.92689L22.081 9.63749L22.8441 9.99368L22.9276 10.3554L22.6268 11.0956L20.8223 11.5409L18.7058 11.9638L15.5534 12.7096L15.5144 12.7374L15.559 12.7931L16.9792 12.9266L17.5863 12.96H19.0734L21.8415 13.166L22.5656 13.6446L23 14.2289L22.9276 14.6742L21.8137 15.2418L20.3099 14.8857L16.801 14.0508L15.598 13.7503H15.4309V13.8505L16.4334 14.83L18.2714 16.4885L20.5716 18.6256L20.6886 19.1543L20.3934 19.5717L20.0815 19.5272L18.0597 18.0078L17.28 17.3233L15.5144 15.8373H15.3975V15.9932L15.8041 16.5887L17.9539 19.8166L18.0653 20.8072L17.9094 21.13L17.3524 21.3248L16.7397 21.2135L15.481 19.4493L14.1833 17.4624L13.1362 15.6815L13.0081 15.7539L12.3899 22.4045L12.1003 22.744L11.4319 23L10.8749 22.577L10.5797 21.8925L10.8749 20.5401L11.2314 18.7759L11.521 17.3734L11.7828 15.6314L11.9387 15.0526L11.9276 15.0137L11.7995 15.0304L10.4851 16.8335L8.48557 19.5328L6.9038 21.2246L6.52506 21.3749L5.86785 21.0354L5.92911 20.4288L6.29671 19.8889L8.48557 17.1062L9.80557 15.381L10.6577 14.3848L10.6522 14.2401H10.602L4.78734 18.0134L3.75139 18.147L3.30582 17.7296L3.36152 17.045L3.57316 16.8224L5.32203 15.6203L5.31646 15.6259Z" fill="currentColor"/>
            </svg>
            <span class="radio-name">Claude</span>
            <span class="tooltip-wrap">
              <svg class="info-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="8" cy="8" r="7"/><path d="M8 7v4" stroke-linecap="round"/><circle cx="8" cy="5" r="0.5" fill="currentColor" stroke="none"/>
              </svg>
              <span class="tooltip">Copies question to clipboard, then opens Claude</span>
            </span>
          </label>
          <label class="radio-option">
            <input type="radio" name="ai" value="x">
            <svg class="radio-logo" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            <span class="radio-name">None</span>
            <span class="tooltip-wrap">
              <svg class="info-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="8" cy="8" r="7"/><path d="M8 7v4" stroke-linecap="round"/><circle cx="8" cy="5" r="0.5" fill="currentColor" stroke="none"/>
              </svg>
              <span class="tooltip">Just copies the question to clipboard</span>
            </span>
          </label>
        </div>
      </div>

      <button id="generate" class="btn-generate">Generate Link</button>

      <div id="result" class="result hidden">
        <div class="result-url" id="result-url"></div>
        <button id="copy-btn" class="btn-copy" aria-label="Copy link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
        <span id="copy-feedback" class="copy-feedback"></span>
      </div>
    </main>

    <footer>
      <p>Inspired by <a href="https://lmgtfy.app" target="_blank" rel="noopener">LMGTFY</a>, but for the AI age.</p>
    </footer>
  </div>

  <script src="./shared/cipher.js"></script>
  <script src="app.js"></script>
</body>
</html>
